<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 72" width="72" height="72">
  <defs>
    <radialGradient id="orb" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c6af5"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c6af5" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#7c6af5" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <!-- Glow -->
  <circle cx="36" cy="36" r="32" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Main orb -->
  <circle cx="36" cy="36" r="28" fill="url(#orb)"/>
  <!-- Inner highlight -->
  <circle cx="30" cy="28" r="8" fill="white" opacity="0.18"/>
  <!-- Letter A mark -->
  <path d="M24 50 L36 22 L48 50 M29 42 L43 42" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
