services:
  andyria:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    ports:
      - "7700:7700"
    volumes:
      - andyria-data:/data/andyria
      - /dev/urandom:/dev/urandom:ro
    environment:
      - ANDYRIA_DATA_DIR=/data/andyria
      - ANDYRIA_NODE_ID=${ANDYRIA_NODE_ID:-andyria-node-0}
      - ANDYRIA_ENTROPY_SOURCES=os_urandom,clock_jitter,thermal,system_stats
      - ANDYRIA_DEPLOYMENT_CLASS=server
      - ANDYRIA_OLLAMA_URL=${ANDYRIA_OLLAMA_URL:-http://host.docker.internal:11434}
      - ANDYRIA_OLLAMA_MODEL=${ANDYRIA_OLLAMA_MODEL:-phi3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Expose hardware RNG if available (e.g. Raspberry Pi BCM)
    # devices:
    #   - /dev/hwrng:/dev/hwrng
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  andyria-peer:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    depends_on:
      andyria:
        condition: service_healthy
    ports:
      - "7701:7700"
    volumes:
      - andyria-peer-data:/data/andyria
      - /dev/urandom:/dev/urandom:ro
    environment:
      - ANDYRIA_DATA_DIR=/data/andyria
      - ANDYRIA_NODE_ID=${ANDYRIA_PEER_NODE_ID:-andyria-node-1}
      - ANDYRIA_ENTROPY_SOURCES=os_urandom,clock_jitter
      - ANDYRIA_PEERS=http://andyria:7700
      - ANDYRIA_OLLAMA_URL=${ANDYRIA_OLLAMA_URL:-http://host.docker.internal:11434}
      - ANDYRIA_OLLAMA_MODEL=${ANDYRIA_OLLAMA_MODEL:-phi3}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  andyria-data:
  andyria-peer-data:
