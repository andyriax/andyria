# Andyria server deployment profile (laptop / workstation / cloud instance)

node_id: "andyria-server-0"
deployment_class: "server"
data_dir: "/var/lib/andyria"

entropy_sources:
  - "os_urandom"
  - "clock_jitter"
  - "thermal"
  - "system_stats"

# Q4_K_M balances quality and RAM (~800 MB)
# Download: make model-server
model_path: "/var/lib/andyria/models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf"
# ollama_url: "http://localhost:11434"

api:
  host: "0.0.0.0"
  port: 7700

performance:
  max_tasks: 8
  model_ctx_tokens: 2048
  beacon_interval_ms: 1000
  entropy_min_active_sources: 2
  entropy_max_consecutive_degraded: 3
  entropy_fail_closed: false

peers: []
